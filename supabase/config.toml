# 9-6-AH — background queue runner. Called by pg_cron every 30s
# without a user JWT; the function uses the service-role key
# internally and does not trust callers.
[functions.process-variant-queue]
verify_jwt = false

# Q103 — Stripe webhook. Stripe does not send a Supabase JWT;
# security comes from STRIPE_WEBHOOK_SECRET signature verification.
[functions.stripe-webhook]
verify_jwt = false

# EB — Delete Selected Data. Caller MUST send a valid Supabase JWT
# (default verify_jwt = true). The function then re-verifies the JWT,
# checks MFA assurance level, and performs deletes with the service-
# role key.
[functions.delete-user-data]
verify_jwt = true