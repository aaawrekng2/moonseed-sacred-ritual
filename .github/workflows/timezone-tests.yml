name: Timezone tests

# Runs the timezone math regression suite on every push and PR. The moon
# carousel's correctness depends entirely on these helpers staying honest
# across DST transitions and the international date line, so we gate
# every change on them in a clean Node environment (NOT the developer's
# local machine, which may have a different system tz).
on:
  push:
    branches: ["**"]
  pull_request:
  # Manual trigger: run from the Actions tab with `update_snapshots=true`
  # to regenerate the committed Vitest snapshots and open a PR with the
  # diff. This is the ONLY supported way to refresh snapshots from CI —
  # the matrix job intentionally fails on drift, so we never want to
  # auto-update on a normal push/PR run.
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate timezone snapshots and open a PR with the diff"
        type: boolean
        default: false
      base_branch:
        description: "Branch to open the snapshot-update PR against"
        type: string
        default: "main"

# ---------------------------------------------------------------------------
# Pinned fast-check seed for the property-based suite.
#
# WHY a fixed seed in CI:
#   - Pull requests must be deterministic. A flaky property failure on PR #N
#     that disappears on rerun is worse than no test at all — reviewers
#     can't tell signal from noise.
#   - With FC_SEED pinned, every PR run explores the SAME 500 instants per
#     property. A failure here is reproducible locally, byte-for-byte:
#         FC_SEED=20260429 npm run test:tz:property
#
# WHY this specific value (20260429):
#   - It's just today's date (YYYYMMDD) at the time the seed was chosen.
#     No magic — it's documented so future maintainers know it isn't load-
#     bearing. Bump it deliberately (e.g. once a quarter) to widen coverage,
#     and update this comment + the README when you do.
#
# WHY a separate job (not just an env var on the matrix job):
#   - The matrix job exercises the unit + snapshot + property tests under
#     several Node versions and system TZs to catch host-leak bugs. Adding
#     a pinned seed there would mask the value of a fresh seed per matrix
#     cell. The dedicated `property-tests-pinned-seed` job below is the
#     one PR reviewers should treat as the authoritative property gate.
# ---------------------------------------------------------------------------
env:
  TIMEZONE_PROPERTY_SEED: "20260429"

jobs:
  timezone-tests:
    name: Timezone helpers (Node ${{ matrix.node }}, TZ=${{ matrix.tz }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
        # Run under several system TZ values to guarantee no test
        # accidentally relies on the runner's local zone. If one of these
        # fails while UTC passes, a test is leaking host-local date math.
        #
        # Coverage rationale (one zone per "DST regime" we care about):
        #   - UTC                  baseline, no DST at all
        #   - America/Los_Angeles  US DST (March / November transitions)
        #   - Europe/Berlin        EU DST (last Sunday of March / October)
        #   - Asia/Tokyo           no DST, +9 fixed offset (catches code
        #                          that assumes DST always exists)
        #   - Australia/Sydney     Southern-Hemisphere DST (October /
        #                          April — opposite direction from NH)
        #   - Pacific/Auckland     Southern-Hemisphere DST + +12/+13
        #                          offset, exercises the int'l date line
        tz:
          - "UTC"
          - "America/Los_Angeles"
          - "Europe/Berlin"
          - "Asia/Tokyo"
          - "Australia/Sydney"
          - "Pacific/Auckland"
    env:
      TZ: ${{ matrix.tz }}
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        # `--prefer-offline` keeps npm honest (still a clean install, no
        # mutating package-lock.json) but reuses the actions/setup-node
        # cache restored above when entries are present, which on a warm
        # cache shaves ~15-20s off install. Falls back to the registry
        # for any package not yet cached.
        run: npm ci --prefer-offline

      # Surface environment + install info BEFORE the test step so a
      # failing run already has the diagnostics inline. We re-run npm
      # with --silent=false and a verbose log level so any peer-dep
      # warning, deprecation notice, or postinstall output is visible
      # without a second CI run.
      - name: Print debug info (Node / npm / install log)
        if: always()
        run: |
          echo "::group::Versions"
          echo "node:    $(node -v)"
          echo "npm:     $(npm -v)"
          echo "OS:      $(uname -a)"
          echo "TZ:      ${TZ:-<unset>}"
          echo "::endgroup::"

          echo "::group::npm config (subset)"
          npm config get registry
          npm config get cache
          npm config get prefer-offline
          echo "::endgroup::"

          # The most recent npm log file (if any) — invaluable when
          # `npm ci` fails partway and the step output got truncated.
          LOG_DIR="$(npm config get cache)/_logs"
          if [ -d "$LOG_DIR" ]; then
            LATEST="$(ls -t "$LOG_DIR" 2>/dev/null | head -n1 || true)"
            if [ -n "$LATEST" ]; then
              echo "::group::Latest npm log ($LATEST)"
              tail -n 200 "$LOG_DIR/$LATEST"
              echo "::endgroup::"
            fi
          fi

      # Catch two distinct problems that `npm ci` alone does NOT catch:
      #   1. A package.json change that wasn't reflected in package-lock.json
      #      AND was committed alongside an out-of-date lockfile (npm ci
      #      will refuse to install in that case, but only if package.json
      #      and lock disagree — committing a stale lock that still parses
      #      passes npm ci silently).
      #   2. A postinstall script (or generator) that mutates tracked
      #      files at install time. Those mutations would slip into
      #      production if a developer forgets to commit them.
      # We assert that the working tree is byte-identical to HEAD after
      # `npm ci`. Anything different is a bug worth blocking the PR for.
      - name: Verify lockfile + working tree are clean after install
        run: |
          set -euo pipefail
          if ! git diff --quiet HEAD -- package.json package-lock.json; then
            echo "::error file=package-lock.json::package.json or package-lock.json changed after 'npm ci'."
            echo "This usually means the committed lockfile is out of sync with package.json."
            echo "Run 'npm install' locally and commit the updated package-lock.json."
            git --no-pager diff HEAD -- package.json package-lock.json
            exit 1
          fi
          # Broader sweep: any other tracked file mutated by install
          # (e.g. a postinstall script writing into src/) is also a fail.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree changed after 'npm ci'. Tracked files were mutated by install."
            git status --porcelain
            git --no-pager diff
            exit 1
          fi

      - name: Run timezone unit + snapshot + property tests
        run: npm run test:ci

      # Upload the per-invariant per-zone coverage JSON written by the
      # property suite (see afterAll in use-timezone.property.test.ts).
      # `if: always()` so we still get the artifact when tests fail —
      # that's exactly when comparing against a known-good run is most
      # useful. Each matrix cell uploads under a unique name so all
      # files coexist on the workflow run page.
      - name: Upload timezone coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tz-coverage-node${{ matrix.node }}-${{ matrix.tz }}
          path: coverage-artifacts/
          if-no-files-found: warn
          retention-days: 30

      # ----------------------------------------------------------------
      # Snapshot drift handling.
      #
      # Split into four steps so a drifted run still produces a
      # downloadable artifact + a clickable URL in the log BEFORE the
      # build fails. The original single-step guard only printed the
      # diff to stdout, which is hard to share with reviewers and gets
      # truncated for large snapshots.
      # ----------------------------------------------------------------
      - name: Detect snapshot drift
        id: snapshot_drift
        # Run regardless of upstream test failures — we still want to
        # surface drift even if a property test failed first.
        if: always()
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain src/lib/__snapshots__)" ]; then
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Snapshot drift detected — capturing diff as artifact (build will fail at end of job)."
          else
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture snapshot diff
        if: always() && steps.snapshot_drift.outputs.drifted == 'true'
        run: |
          set -euo pipefail
          mkdir -p snapshot-diff

          # 1. Unified diff (what most reviewers want).
          git --no-pager diff --no-color src/lib/__snapshots__ \
            > snapshot-diff/snapshot.diff

          # 2. Side-by-side stat for the PR description.
          git --no-pager diff --stat src/lib/__snapshots__ \
            > snapshot-diff/snapshot.stat.txt

          # 3. The changed snapshot files themselves so a developer can
          #    `cp` them into their working tree without re-running tests.
          mkdir -p snapshot-diff/updated-files
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "snapshot-diff/updated-files/$(dirname "$f")"
            cp "$f" "snapshot-diff/updated-files/$f"
          done < <(git diff --name-only src/lib/__snapshots__)

          # 4. A README explaining how to apply the diff.
          cat > snapshot-diff/README.md <<EOF
          # Snapshot drift on $(echo "${{ matrix.tz }}") / Node ${{ matrix.node }}

          - **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - **Commit:** ${{ github.sha }}
          - **Trigger:** ${{ github.event_name }}

          ## Files
          - \`snapshot.diff\` — unified diff against \`HEAD\`
          - \`snapshot.stat.txt\` — line-count summary
          - \`updated-files/\` — full new snapshot files (drop-in replacements)

          ## To apply locally
          \`\`\`sh
          cd <repo>
          git apply path/to/snapshot.diff
          # OR
          cp -R path/to/updated-files/src/lib/__snapshots__/. src/lib/__snapshots__/
          npm run test:tz   # confirm clean
          git add src/lib/__snapshots__ && git commit -m "test(tz): refresh snapshots"
          \`\`\`
          EOF

          echo "::group::Snapshot diff (preview, also in artifact)"
          head -n 200 snapshot-diff/snapshot.diff || true
          echo "::endgroup::"

      - name: Upload snapshot diff artifact
        if: always() && steps.snapshot_drift.outputs.drifted == 'true'
        id: upload_snapshot_diff
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diff-node${{ matrix.node }}-${{ matrix.tz }}
          path: snapshot-diff/
          if-no-files-found: error
          retention-days: 30

      - name: Print snapshot diff artifact link
        if: always() && steps.snapshot_drift.outputs.drifted == 'true'
        env:
          ARTIFACT_ID: ${{ steps.upload_snapshot_diff.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload_snapshot_diff.outputs.artifact-url }}
        run: |
          set -euo pipefail
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # The `artifact-url` output is the canonical, short-lived
          # download link emitted by upload-artifact@v4. We also surface
          # the run URL as a stable fallback in case the artifact link
          # expires before someone clicks it.
          echo "::notice title=Snapshot diff uploaded::Download: ${ARTIFACT_URL:-$RUN_URL}"
          echo ""
          echo "─── Snapshot drift artifact ───"
          echo "  Direct download : ${ARTIFACT_URL:-<unavailable>}"
          echo "  Workflow run    : $RUN_URL"
          echo "  Artifact name   : snapshot-diff-node${{ matrix.node }}-${{ matrix.tz }}"
          echo "  Artifact ID     : ${ARTIFACT_ID:-<unavailable>}"
          echo "───────────────────────────────"

          # Mirror the link into the workflow Summary tab so it shows
          # up alongside the coverage table.
          {
            echo ""
            echo "## ⚠️ Snapshot drift on \`${{ matrix.tz }}\` / Node ${{ matrix.node }}"
            echo ""
            echo "- **Download diff artifact:** ${ARTIFACT_URL:-(see workflow run page)}"
            echo "- **Workflow run:** $RUN_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail build on snapshot drift
        if: always() && steps.snapshot_drift.outputs.drifted == 'true'
        run: |
          echo "::error::Snapshot drift detected. Download the 'snapshot-diff-node${{ matrix.node }}-${{ matrix.tz }}' artifact above for the full diff, then run 'npm test -- -u' locally and commit the updated snapshots."
          exit 1

  property-tests-pinned-seed:
    name: Property suite (pinned seed ${{ env.TIMEZONE_PROPERTY_SEED }})
    # Only gate pull requests on the pinned-seed run. Push builds already
    # cover this through the matrix job above (with fresh seeds), and we
    # don't want to double-bill every push.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TZ: "UTC"
      CI: "true"
      # Hand the documented seed to fast-check via the test runner. See
      # runProperty() in src/lib/use-timezone.property.test.ts for how this
      # is consumed.
      FC_SEED: ${{ env.TIMEZONE_PROPERTY_SEED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Print debug info (Node / npm / install log)
        if: always()
        run: |
          echo "::group::Versions"
          echo "node:    $(node -v)"
          echo "npm:     $(npm -v)"
          echo "OS:      $(uname -a)"
          echo "TZ:      ${TZ:-<unset>}"
          echo "FC_SEED: ${FC_SEED:-<unset>}"
          echo "::endgroup::"

          LOG_DIR="$(npm config get cache)/_logs"
          if [ -d "$LOG_DIR" ]; then
            LATEST="$(ls -t "$LOG_DIR" 2>/dev/null | head -n1 || true)"
            if [ -n "$LATEST" ]; then
              echo "::group::Latest npm log ($LATEST)"
              tail -n 200 "$LOG_DIR/$LATEST"
              echo "::endgroup::"
            fi
          fi

      # See the matrix job for rationale. We re-run the same lockfile
      # guard here so the pinned-seed PR gate is also a clean-tree gate.
      - name: Verify lockfile + working tree are clean after install
        run: |
          set -euo pipefail
          if ! git diff --quiet HEAD -- package.json package-lock.json; then
            echo "::error file=package-lock.json::Lockfile drift after 'npm ci'. Run 'npm install' and commit package-lock.json."
            git --no-pager diff HEAD -- package.json package-lock.json
            exit 1
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree changed after 'npm ci'."
            git status --porcelain
            exit 1
          fi

      - name: Run property suite with pinned seed
        run: |
          echo "Using fast-check seed: $FC_SEED"
          echo "To reproduce a failure locally:"
          echo "  FC_SEED=$FC_SEED npm run test:tz:property"
          npm run test:tz:property

      # ---------------------------------------------------------------
      # Cross-run comparison.
      #
      # Download the pinned-seed coverage artifact from the most recent
      # SUCCESSFUL workflow run on the same workflow file, then diff it
      # against the JSON we just produced. This catches "silent"
      # coverage regressions: a zone that used to receive 30 cases now
      # gets 0 because someone narrowed an `arbInstant` range or
      # accidentally pruned a zone from the list.
      #
      # Best-effort: a brand-new branch (or first run after the artifact
      # retention window) won't have a previous artifact, so we just
      # log "no baseline" and move on. We never fail the build for a
      # missing baseline — only for a real regression.
      # ---------------------------------------------------------------
      - name: Download previous pinned-seed coverage (best-effort)
        id: prev
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: tz-coverage-pinned-seed-${{ env.TIMEZONE_PROPERTY_SEED }}
        run: |
          set -euo pipefail
          mkdir -p previous-coverage

          # Find the most recent SUCCESSFUL run of THIS workflow that
          # isn't the current run. We restrict to workflow_dispatch +
          # pull_request triggers since those are the only events that
          # populate this artifact.
          PREV_RUN_ID="$(gh run list \
            --workflow "${{ github.workflow }}" \
            --status success \
            --limit 20 \
            --json databaseId,headSha \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }})] | .[0].databaseId" || true)"

          if [ -z "$PREV_RUN_ID" ] || [ "$PREV_RUN_ID" = "null" ]; then
            echo "No previous successful run found — skipping coverage diff."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing against run #$PREV_RUN_ID"
          if gh run download "$PREV_RUN_ID" -n "$ARTIFACT_NAME" -D previous-coverage 2>/dev/null; then
            if [ -f previous-coverage/latest.json ]; then
              echo "found=true" >> "$GITHUB_OUTPUT"
              echo "prev_run_id=$PREV_RUN_ID" >> "$GITHUB_OUTPUT"
            else
              echo "Previous artifact downloaded but no latest.json inside — skipping."
              echo "found=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Previous run had no '$ARTIFACT_NAME' artifact (likely expired or schema changed) — skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff coverage against previous run
        if: always() && steps.prev.outputs.found == 'true'
        run: |
          node scripts/compare-tz-coverage.mjs \
            --current coverage-artifacts/latest.json \
            --previous previous-coverage/latest.json \
            --summary "$GITHUB_STEP_SUMMARY" \
            --fail-on-disappeared-zone \
            --drop-threshold 5

      - name: Upload pinned-seed coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tz-coverage-pinned-seed-${{ env.TIMEZONE_PROPERTY_SEED }}
          path: coverage-artifacts/
          if-no-files-found: warn
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Manual snapshot refresh.
  #
  # Triggered ONLY by `workflow_dispatch` with `update_snapshots=true`.
  # The job:
  #   1. Regenerates Vitest snapshots with `vitest run -u`.
  #   2. If anything changed, pushes a branch and opens a PR against
  #      `base_branch` (default: main) with the diff.
  #   3. If nothing changed, exits cleanly with a "no drift" notice.
  #
  # Why a PR (not a direct commit to the base branch):
  #   - Snapshot updates are real semantic changes — they encode what
  #     getYmdInTz/getDayInTz are expected to return. They MUST be
  #     reviewed by a human, not auto-merged.
  #   - Opening a PR lets the standard `pull_request` matrix above
  #     re-run on the new snapshots, so we can see they're internally
  #     consistent across all 12 (Node × TZ) cells before merging.
  # ---------------------------------------------------------------------------
  update-snapshots:
    name: Refresh timezone snapshots (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TZ: "UTC"
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN; permissions block above grants
          # what we need to push a branch and open a PR.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Regenerate snapshots
        # `-u` updates obsolete snapshots in place. We scope to the tz
        # files only — refreshing every snapshot in the repo from a
        # narrow timezone change would be a footgun.
        run: npx vitest run -u src/lib/use-timezone

      - name: Detect snapshot diff
        id: diff
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain src/lib/__snapshots__)" ]; then
            echo "No snapshot changes — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Snapshot drift detected:"
            git --no-pager diff --stat src/lib/__snapshots__
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request with refreshed snapshots
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: ${{ inputs.base_branch }}
          branch: ci/refresh-tz-snapshots-${{ github.run_id }}
          commit-message: "test(tz): refresh timezone snapshots via workflow_dispatch"
          title: "Refresh timezone snapshots (run #${{ github.run_number }})"
          body: |
            Automated snapshot refresh triggered manually via the
            **Timezone tests** workflow with `update_snapshots=true`.

            - Triggered by: @${{ github.actor }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Base branch: `${{ inputs.base_branch }}`

            ⚠️ **Review carefully.** Snapshot changes encode the expected
            output of `getYmdInTz` / `getDayInTz` for fixed instants and
            zones. A diff here means the timezone helpers' behavior has
            changed — make sure that change is intentional before merging.
          add-paths: |
            src/lib/__snapshots__/**
          delete-branch: true